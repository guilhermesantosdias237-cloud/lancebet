name: lancebet
# Execute a partir do diretório deploy/ (ou aponte -f deploy/docker-compose.yml).
# O contexto de build é a RAIZ do repositório, pois o Dockerfile multi-stage
# precisa de frontend/ (build do SPA) e backend/ (API FastAPI).
services:
  web:
    container_name: lancebet.dwa.ifes.site
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8413:8000"
    restart: unless-stopped
    environment:
      # Banco SQLite dentro do volume persistente (ver volume lancebet_data abaixo).
      DATABASE_PATH: /app/data/dados.db
    # Persiste o banco SQLite e os uploads entre recriações do container.
    volumes:
      - lancebet_data:/app/data
      - lancebet_uploads:/app/static/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  lancebet_data:
    name: deploy_lancebet_data
  lancebet_uploads:
    name: deploy_lancebet_uploads
