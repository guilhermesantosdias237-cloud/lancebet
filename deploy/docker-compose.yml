# ⚠️ NOME DO PROJETO COMPOSE — OBRIGATÓRIO trocar por fork (ver docs/FORKING.md §2b).
# Sem este `name:`, o Compose deriva o nome do projeto da PASTA do arquivo (`deploy/`),
# então TODO fork vira o mesmo projeto "deploy" no host. Consequência: cada deploy roda
# `docker compose down --remove-orphans` e DERRUBA os containers dos outros forks
# (502 Bad Gateway nos demais). O `name` precisa ser ÚNICO por projeto no VPS.
name: lancebet
# Execute a partir do diretório deploy/ (ou aponte -f deploy/docker-compose.yml).
# O contexto de build é a RAIZ do repositório, pois o Dockerfile multi-stage
# precisa de frontend/ (build do SPA) e backend/ (API FastAPI).
services:
  web:
    container_name: lancebet.dwa.ifes.site
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8413:8000"
    restart: unless-stopped
    environment:
      # Banco SQLite dentro do volume persistente (ver volume lancebet_data abaixo).
      DATABASE_PATH: /app/data/dados.db
    # Persiste o banco SQLite, os uploads e as fotos de perfil entre recriações
    # do container. As fotos (static/img/usuarios) são geradas em runtime pelo
    # seed e por uploads dos usuários — não vão para a imagem (estão no
    # .gitignore), então precisam de volume para sobreviver ao redeploy.
    volumes:
      - lancebet_data:/app/data
      - lancebet_uploads:/app/static/uploads
      - lancebet_fotos:/app/static/img/usuarios
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  # `name:` fixa o nome FÍSICO do volume no host (sem o prefixo do projeto).
  lancebet_data:
    name: deploy_lancebet_data
  lancebet_uploads:
    name: deploy_lancebet_uploads
  lancebet_fotos:
    name: deploy_lancebet_fotos
